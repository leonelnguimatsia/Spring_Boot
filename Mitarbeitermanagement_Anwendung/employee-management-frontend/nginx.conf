server {
    listen 80;

    # React-Build-Dateien ausliefern
    root /usr/share/nginx/html;
    index index.html;

    # React Router: Alle Routen an index.html weiterleiten
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-Anfragen an das Backend weiterleiten
    location /api/ {
        proxy_pass http://backend:8080/api/;
    }
}
